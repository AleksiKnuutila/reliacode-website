name: Deploy to GitHub Pages

on:
  # Auto-deploy on every push to main.
  push:
    branches: [main]
  # Manual trigger from the Actions tab if you ever need it.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue parallel deploys; cancel any in-flight run if a new one
# arrives. Don't cancel a run that's already in the "deploy" phase.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
